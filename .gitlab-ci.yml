variables:
    APP: innovplay_api
    ENVIRONMENT: prod
    RUNNER: vps
    IMAGE_TAG: "$APP:latest"
    CONTAINER_NAME: "$APP"
    HOST_PORT: 5000
    CONTAINER_PORT: 5000

workflow:
    rules:
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != 'dev' || $CI_PIPELINE_SOURCE == 'trigger'"
          variables:
              ENVIRONMENT: local
              RUNNER: local
              IMAGE_TAG: "$APP:local"
              CONTAINER_NAME: "$APP-local"
              DATABASE_URL: postgresql://postgres_user:postgres_password@postgres_container:5432/postgres_db
              FRONTEND_URL: http://localhost:8000
        - if: "$CI_COMMIT_BRANCH == 'dev'"
          variables:
              ENVIRONMENT: dev
              IMAGE_TAG: "$APP:dev"
              CONTAINER_NAME: "$APP-dev"
              HOST_PORT: 5001
        - if: "$CI_COMMIT_BRANCH == 'main'"
        - when: never

stages:
    - validate_pipeline
    - prebuild
    - build
    - predeploy
    - mock
    - deploy
    - clean

.set_runner_tag:
    tags:
        - $RUNNER

.set_none_git_strategy:
    variables:
        GIT_STRATEGY: none

.clean_job:
    script:
        - |
            CONTAINER_IDS=$(docker container ls -a -f ancestor="$IMAGE_TAG" -q)

            if [ -z "$CONTAINER_IDS" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container do app não existe."
            else
                for ID in $CONTAINER_IDS; do
                    IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$ID")

                    if [ "$IS_RUNNING" = "true" ]; then
                        docker container stop "$ID"

                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container do app com id '$ID' foi parado."
                    else
                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container do app com id '$ID' já está parado."
                    fi

                    docker container rm "$ID"

                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container do app com id '$ID' foi removido."
                done
            fi
        - |
            IMAGE_ID=$(docker image ls -f reference="$IMAGE_TAG" -q)

            if [ -z "$IMAGE_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' não existe."
            else
                docker image rm "$IMAGE_ID"

                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' com id '$IMAGE_ID' foi removida."
            fi

invalid_merge_request:
    stage: validate_pipeline
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    rules:
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'"
    script:
        - |
            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MR para 'main' só é permitido a partir da branch 'dev'."
            exit 1

image_clean:
    stage: prebuild
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
        - .clean_job
    before_script:
        - |
            command -v docker >/dev/null || { echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Docker não disponível"; exit 1; }

image_build:
    stage: build
    extends:
        - .set_runner_tag
    environment:
        name: $ENVIRONMENT
    rules:
        - changes:
            - Dockerfile
            - requirements.txt
    script:
        - |
            set -e

            docker build -t "$IMAGE_TAG" .

            echo "DATABASE_URL=$DATABASE_URL" > app/.env
            echo "FRONTEND_URL=$FRONTEND_URL" >> app/.env
            echo "JWT_SECRET_KEY=$JWT_SECRET_KEY" >> app/.env
            echo "SENDGRID_API_KEY=$SENDGRID_API_KEY" >> app/.env
            echo "SENDGRID_FROM_EMAIL=$SENDGRID_FROM_EMAIL" >> app/.env

            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> app/.env
            echo "TELEGRAM_GROUP_ID=$TELEGRAM_GROUP_ID" >> app/.env
            echo "TELEGRAM_ALERT_ENABLED=$TELEGRAM_ALERT_ENABLED" >> app/.env

            echo "CELERY_BROKER_URL=$CELERY_BROKER_URL" >> app/.env
            echo "CELERY_RESULT_BACKEND=$CELERY_RESULT_BACKEND" >> app/.env
            echo "REDIS_URL=$REDIS_URL" >> app/.env
            echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> app/.env

            docker build --no-cache -t "$IMAGE_TAG" .

            IMAGE_ID=$(docker image ls -f reference="$IMAGE_TAG" -q)

            if [ -z "$IMAGE_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' não foi encontrada após o build."
                exit 1
            else
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' criada com id '$IMAGE_ID'."
            fi

network_create:
    stage: predeploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    script:
        - |
            set -e

            NETWORK=$(docker network ls -f name="^${ENVIRONMENT}$" -q)

            if [ -z "$NETWORK" ]; then
                docker network create "$ENVIRONMENT"

                NETWORK=$(docker network ls -f name="^${ENVIRONMENT}$" -q)

                if [ -z "$NETWORK" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Falha ao criar a network '$ENVIRONMENT'."
                    exit 1
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' criada com sucesso."
                fi
            else
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' já existe."
            fi

mock_database:
    stage: mock
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    rules:
        - if: "$ENVIRONMENT == 'local'"
    script:
        - |
            CONTAINER_ID=$(docker container ls -a -f name=^postgres_container$ -q)

            if [ -z "$CONTAINER_ID" ]; then
                docker container run -d --name postgres_container --network "$ENVIRONMENT" -p 5432:5432 -e POSTGRES_USER=postgres_user -e POSTGRES_PASSWORD=postgres_password -e POSTGRES_DB=postgres_db postgres
                
                CONTAINER_ID=$(docker container ls -a -f name=^postgres_container$ -q)

                if [ -z "$CONTAINER_ID" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Falha ao criar a container 'postgres_container'."
                    exit 1
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container postgres_container criado com sucesso."
                fi
            else
                IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$CONTAINER_ID")

                if [ "$IS_RUNNING" = "true" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' já está ativo."
                else
                    docker container start postgres_container

                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' iniciado."
                fi
            fi

            TIMEOUT=60
            ELAPSED=0

            until docker exec postgres_container pg_isready; do
                sleep 1

                ELAPSED=$((ELAPSED + 1))

                if [ $ELAPSED -ge $TIMEOUT ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Timeout esperando o banco ficar pronto."

                    docker logs postgres_container

                    exit 1
                fi
            done

container_run:
    stage: deploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
        on_stop: environment_clean
    script:
        - docker rm -f "$CONTAINER_NAME" || true
        - |
            set -e

            docker container run --network "$ENVIRONMENT" -p "$HOST_PORT:$CONTAINER_PORT" --name "$CONTAINER_NAME" -d "$IMAGE_TAG"

            CONTAINER_ID=$(docker container ls -a -f ancestor="$IMAGE_TAG" -q)

            if [ -z "$CONTAINER_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Falha ao criar o container '$CONTAINER_NAME'."
                exit 1
            else
                sleep 30

                IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$CONTAINER_ID")

                if [ "$IS_RUNNING" = "true" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' criado com id '$CONTAINER_ID'."
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - O container '$CONTAINER_NAME' foi criado mas parou."
                    exit 1
                fi
            fi

container_run_celery:
    stage: deploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
    script:
        - |
            set -e

            CELERY_CONTAINER_NAME="${CONTAINER_NAME}-celery"

            echo "Iniciando Celery Worker: $CELERY_CONTAINER_NAME"

            # Remove worker antigo se existir
            if docker container ls -a -f name="^${CELERY_CONTAINER_NAME}$" -q; then
                echo "Removendo container Celery antigo..."
                docker stop "$CELERY_CONTAINER_NAME" || true
                docker rm "$CELERY_CONTAINER_NAME" || true
            fi

            # Subir Celery Worker
            docker run -d \
              --name "$CELERY_CONTAINER_NAME" \
              --network "$ENVIRONMENT" \
              "$IMAGE_TAG" \
              celery -A app.report_analysis.celery_app worker \
              --loglevel=info \
              --concurrency=2

            sleep 10

            # Verificar se o worker está rodando
            if docker inspect -f "{{.State.Running}}" "$CELERY_CONTAINER_NAME" | grep true; then
                echo "Celery worker iniciado com sucesso."
            else
                echo "Falha ao iniciar o Celery worker."
                docker logs "$CELERY_CONTAINER_NAME"
                exit 1
            fi

environment_clean:
    stage: clean
    extends:
        - .set_none_git_strategy
        - .clean_job
    environment:
        name: $ENVIRONMENT
        action: stop
    rules:
        - if: "$ENVIRONMENT == 'local'"
          when: manual
    allow_failure: true
    after_script:
        - |
            CONTAINER_IDS=$(docker container ls -a -f name=^postgres_container$ -q)

            if [ -z "$CONTAINER_IDS" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' não existe."
            else
                for ID in $CONTAINER_IDS; do
                    IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$ID")

                    if [ "$IS_RUNNING" = "true" ]; then
                        docker container stop "$ID"

                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' com id '$ID' foi parado."
                    else
                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' com id '$ID' já está parado."
                    fi

                    docker container rm "$ID"

                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' com id '$ID' foi removido."
                done
            fi
        - |
            NETWORK=$(docker network ls -f name="^${ENVIRONMENT}$" -q)

            if [ -z "$NETWORK" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' não existe."
            else
                docker network rm "$NETWORK"

                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' foi removida."
            fi
