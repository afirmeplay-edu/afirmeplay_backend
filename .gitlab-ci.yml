 .default_job:
    variables:
        APP: innovplay_backend
        IMAGE_TAG: $APP:$CI_COMMIT_REF_NAME
        DEPLOY_NAME: $APP-$CI_COMMIT_REF_NAME
        PORT: 5002
    rules:
        - if: "$CI_COMMIT_BRANCH == 'main'"
          variables:
            IMAGE_TAG: $APP:prod
            DEPLOY_NAME: $APP-prod
            PORT: 5000
        - if: "$CI_COMMIT_BRANCH == 'dev'"
          variables:
            PORT: 5001
        - when: always

stages:
    - prebuild
    - build
    - predeploy
    - deploy
    - clean

image_clean:
    extends: .default_job
    stage: prebuild
    except:
        - main
        - dev
    cache: []
    variables:
        GIT_STRATEGY: none
    script:
        - RUNNING_CONTAINER_ID=$(docker container ls -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z $RUNNING_CONTAINER_ID ]; then
                echo "Sem container ativo."
            else
                docker container stop $RUNNING_CONTAINER_ID

                echo "Container parado."
            fi
        - CONTAINER_ID=$(docker container ls -a -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z $CONTAINER_ID ]; then
                echo "Container não existe."
            else
                docker container rm $CONTAINER_ID

                echo "Container removido."
            fi
        - IMAGE_ID=$(docker image ls -f reference=$IMAGE_TAG -q)
        - >
            if [ -z $IMAGE_ID ]; then
                echo "Imagem não existe."
            else
                docker image rm $IMAGE_ID

                echo "Imagem removida."
            fi

network_create:
    extends: .default_job
    stage: predeploy
    except:
        - main
        - dev
    variables:
        GIT_STRATEGY: none
    script:
        - NETWORK=$(docker network ls -f name=$CI_COMMIT_REF_NAME -q)
        - >
            if [ -z $NETWORK ]; then
                docker network create $CI_COMMIT_REF_NAME

                echo "Network criada."
            else
                echo "Network já existe."
            fi

image_build:
    extends: .default_job
    stage: build
    except:
        - main
        - dev
    cache:
        paths:
            - .
    script:
        - echo "PORT=$PORT" >> ./app/.env
        - docker build --no-cache -t $IMAGE_TAG .

container_run:
    extends: .default_job
    stage: deploy
    except:
        - main
        - dev
    cache: []
    variables:
        GIT_STRATEGY: none
    environment:
        name: $CI_COMMIT_REF_NAME
        on_stop: environment_clean
    script:
        - docker container run --network $CI_COMMIT_REF_NAME -p $PORT:$PORT --name $DEPLOY_NAME -d $IMAGE_TAG

environment_clean:
    extends: .default_job
    stage: clean
    except:
        - main
        - dev
    cache: []
    dependencies: []
    variables:
        GIT_STRATEGY: none
    environment:
        name: $CI_COMMIT_REF_NAME
        action: stop
    when: manual
    script:
        - RUNNING_CONTAINER_ID=$(docker container ls -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z $RUNNING_CONTAINER_ID ]; then
                echo "Sem container ativo."
            else
                docker container stop $RUNNING_CONTAINER_ID

                echo "Container parado."
            fi
        - CONTAINER_ID=$(docker container ls -a -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z $CONTAINER_ID ]; then
                echo "Container não existe."
            else
                docker container rm $CONTAINER_ID

                echo "Container removido."
            fi
        - IMAGE_ID=$(docker image ls -f reference=$IMAGE_TAG -q)
        - >
            if [ -z $IMAGE_ID ]; then
                echo "Imagem não existe."
            else
                docker image rm $IMAGE_ID

                echo "Imagem removida."
            fi
        - NETWORK=$(docker network ls -f name=$CI_COMMIT_REF_NAME -q)
        - >
            if [ -z $NETWORK ]; then
                echo "Network não existe"
            else
                docker network rm $CI_COMMIT_REF_NAME

                echo "Network removida."
            fi
