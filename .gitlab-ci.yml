variables:
    APP: innovplay_api
    ENVIRONMENT: prod
    RUNNER: vps
    IMAGE_TAG: "$APP:latest"
    CONTAINER_NAME: "$APP"
    HOST_PORT: 5000
    CONTAINER_PORT: 5000

workflow:
    rules:
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != 'dev' || $CI_PIPELINE_SOURCE == 'trigger'"
          variables:
              ENVIRONMENT: local
              RUNNER: local
              IMAGE_TAG: "$APP:local"
              CONTAINER_NAME: "$APP-local"
              DATABASE_URL: postgresql://postgres_user:postgres_password@postgres_container:5432/postgres_db
              FRONTEND_URL: http://localhost:8000
        - if: "$CI_COMMIT_BRANCH == 'dev'"
          variables:
              ENVIRONMENT: dev
              IMAGE_TAG: "$APP:dev"
              CONTAINER_NAME: "$APP-dev"
              HOST_PORT: 5001
        - if: "$CI_COMMIT_BRANCH == 'main'"
        - when: never

stages:
    - validate_pipeline
    - prebuild
    - build
    - predeploy
    - mock
    - mock_storage
    - deploy
    - clean

.set_runner_tag:
    tags:
        - $RUNNER

.set_none_git_strategy:
    variables:
        GIT_STRATEGY: none

.clean_job:
    script:
        - |
            CONTAINER_IDS=$(docker container ls -a -f name="^${CONTAINER_NAME}$" -q)

            if [ -z "$CONTAINER_IDS" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' não existe."
            else
                for ID in $CONTAINER_IDS; do
                    IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$ID" 2>/dev/null || echo "false")

                    if [ "$IS_RUNNING" = "true" ]; then
                        docker container stop "$ID" 2>/dev/null || true
                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' parado."
                    else
                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' já estava parado."
                    fi

                    docker container rm "$ID" 2>/dev/null || true
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' removido."
                done
            fi
        - |
            IMAGE_ID=$(docker image ls -f reference="$IMAGE_TAG" -q)

            if [ -z "$IMAGE_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' não existe."
            else
                docker image rm "$IMAGE_ID" 2>/dev/null || true
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' removida."
            fi

invalid_merge_request:
    stage: validate_pipeline
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    rules:
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'"
    script:
        - |
            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MR para 'main' só é permitido a partir da branch 'dev'."
            exit 1

image_clean:
    stage: prebuild
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
        - .clean_job
    before_script:
        - |
            command -v docker >/dev/null || { echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Docker não disponível"; exit 1; }

image_build:
    stage: build
    extends:
        - .set_runner_tag
    environment:
        name: $ENVIRONMENT
    script:
        - |
            set -e

            docker build -t "$IMAGE_TAG" .

            echo "DATABASE_URL=$DATABASE_URL" > app/.env
            echo "FRONTEND_URL=$FRONTEND_URL" >> app/.env
            echo "JWT_SECRET_KEY=$JWT_SECRET_KEY" >> app/.env
            echo "SENDGRID_API_KEY=$SENDGRID_API_KEY" >> app/.env
            echo "SENDGRID_FROM_EMAIL=$SENDGRID_FROM_EMAIL" >> app/.env

            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> app/.env
            echo "TELEGRAM_GROUP_ID=$TELEGRAM_GROUP_ID" >> app/.env
            echo "TELEGRAM_ALERT_ENABLED=$TELEGRAM_ALERT_ENABLED" >> app/.env

            echo "CELERY_BROKER_URL=$CELERY_BROKER_URL" >> app/.env
            echo "CELERY_RESULT_BACKEND=$CELERY_RESULT_BACKEND" >> app/.env
            echo "REDIS_URL=$REDIS_URL" >> app/.env
            echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> app/.env

            echo "MINIO_ENDPOINT=$MINIO_ENDPOINT" >> app/.env
            echo "MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY" >> app/.env
            echo "MINIO_SECRET_KEY=$MINIO_SECRET_KEY" >> app/.env
            echo "MINIO_SECURE=$MINIO_SECURE" >> app/.env

            echo "GOOGLE_AI_STUDIO_API_KEY=$GOOGLE_AI_STUDIO_API_KEY" >> app/.env
            echo "GOOGLE_AI_STUDIO_MODEL=$GOOGLE_AI_STUDIO_MODEL" >> app/.env
            echo "APP_ENV=$APP_ENV" >> app/.env

            docker build --no-cache -t "$IMAGE_TAG" .

            IMAGE_ID=$(docker image ls -f reference="$IMAGE_TAG" -q)

            if [ -z "$IMAGE_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' não foi encontrada após o build."
                exit 1
            else
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Imagem '$IMAGE_TAG' criada com id '$IMAGE_ID'."
            fi

network_create:
    stage: predeploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    script:
        - |
            set -e

            NETWORK=$(docker network ls -f name="^${ENVIRONMENT}$" -q)

            if [ -z "$NETWORK" ]; then
                docker network create "$ENVIRONMENT"

                NETWORK=$(docker network ls -f name="^${ENVIRONMENT}$" -q)

                if [ -z "$NETWORK" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Falha ao criar a network '$ENVIRONMENT'."
                    exit 1
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' criada com sucesso."
                fi
            else
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' já existe."
            fi

mock_database:
    stage: mock
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    rules:
        - if: "$ENVIRONMENT == 'local'"
    script:
        - |
            CONTAINER_ID=$(docker container ls -a -f name=^postgres_container$ -q)

            if [ -z "$CONTAINER_ID" ]; then
                docker container run -d --name postgres_container --network "$ENVIRONMENT" -p 5432:5432 -e POSTGRES_USER=postgres_user -e POSTGRES_PASSWORD=postgres_password -e POSTGRES_DB=postgres_db postgres
                
                CONTAINER_ID=$(docker container ls -a -f name=^postgres_container$ -q)

                if [ -z "$CONTAINER_ID" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Falha ao criar a container 'postgres_container'."
                    exit 1
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container postgres_container criado com sucesso."
                fi
            else
                IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$CONTAINER_ID")

                if [ "$IS_RUNNING" = "true" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' já está ativo."
                else
                    docker container start postgres_container

                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' iniciado."
                fi
            fi

            TIMEOUT=60
            ELAPSED=0

            until docker exec postgres_container pg_isready; do
                sleep 1

                ELAPSED=$((ELAPSED + 1))

                if [ $ELAPSED -ge $TIMEOUT ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Timeout esperando o banco ficar pronto."

                    docker logs postgres_container

                    exit 1
                fi
            done

minio_setup:
    stage: mock_storage
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
    script:
        - |
            set -e

            MINIO_CONTAINER_NAME="minio-server"

            # 1. Verificar se MinIO já existe e está rodando
            MINIO_ID=$(docker container ls -a -f name="^${MINIO_CONTAINER_NAME}$" -q)

            if [ -z "$MINIO_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Criando container MinIO..."
                
                # Criar container MinIO
                docker run -d \
                  --name "$MINIO_CONTAINER_NAME" \
                  --network "$ENVIRONMENT" \
                  -p 9000:9000 \
                  -p 9001:9001 \
                  -e MINIO_ROOT_USER="${MINIO_ROOT_USER}" \
                  -e MINIO_ROOT_PASSWORD="${MINIO_ROOT_PASSWORD}" \
                  -e MINIO_SERVER_URL="https://demo.afirmeplay.com.br" \
                  -v minio_data:/data \
                  minio/minio:latest \
                  server /data --console-address ":9001"
                
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MinIO container criado."
            else
                # Verificar se está rodando
                IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$MINIO_ID")
                
                if [ "$IS_RUNNING" = "true" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MinIO já está rodando."
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Iniciando MinIO..."
                    docker start "$MINIO_CONTAINER_NAME"
                fi
            fi

            # 2. Aguardar MinIO ficar pronto (health check)
            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Aguardando MinIO ficar pronto..."
            TIMEOUT=60
            ELAPSED=0

            until docker exec "$MINIO_CONTAINER_NAME" curl -f http://localhost:9000/minio/health/live 2>/dev/null; do
                sleep 2
                ELAPSED=$((ELAPSED + 2))
                
                if [ $ELAPSED -ge $TIMEOUT ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Timeout esperando MinIO ficar pronto."
                    docker logs "$MINIO_CONTAINER_NAME"
                    exit 1
                fi
            done

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MinIO está pronto!"

            # 3. Criar buckets (usando mc - MinIO Client)
            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Criando buckets..."

            # Usar container alpine com mc instalado para ter acesso a sh
            docker run --rm \
              --network "$ENVIRONMENT" \
              alpine:latest \
              sh -c "
                apk add --no-cache curl > /dev/null 2>&1;
                wget -q -O /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc;
                chmod +x /tmp/mc;
                /tmp/mc alias remove myminio || true
                /tmp/mc alias set myminio http://minio-server:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
                /tmp/mc mb myminio/answer-sheets --ignore-existing || true;
                /tmp/mc mb myminio/physical-tests --ignore-existing || true;
                /tmp/mc mb myminio/municipality-logos --ignore-existing || true;
                /tmp/mc mb myminio/school-logos --ignore-existing || true;
                /tmp/mc mb myminio/question-images --ignore-existing || true;
                /tmp/mc mb myminio/user-uploads --ignore-existing || true;
                /tmp/mc anonymous set download myminio/answer-sheets || true;
                /tmp/mc anonymous set download myminio/physical-tests || true;
                /tmp/mc anonymous set public myminio/municipality-logos || true;
                /tmp/mc anonymous set public myminio/school-logos || true;
                echo 'Buckets criados com sucesso!'
              "

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Setup de buckets concluído!"

            echo "$(date '+[%Y-%m-%d %H:%M:%S]') - MinIO setup completo!"

container_run:
    stage: deploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
        on_stop: environment_clean
    script:
        - docker rm -f "$CONTAINER_NAME" || true
        - |
            set -e

            # Remove container antigo se existir
            if docker container ls -a -f name="^${CONTAINER_NAME}$" -q; then
                echo "Removendo container antigo '$CONTAINER_NAME'..."
                docker stop "$CONTAINER_NAME" || true
                docker rm "$CONTAINER_NAME" || true
            fi

            docker container run --network "$ENVIRONMENT" -p "$HOST_PORT:$CONTAINER_PORT" --name "$CONTAINER_NAME" -d "$IMAGE_TAG"


            CONTAINER_ID=$(docker container ls -a -f name="^${CONTAINER_NAME}$" -q) 

            if [ -z "$CONTAINER_ID" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Falha ao criar o container '$CONTAINER_NAME'."
                exit 1
            else
                sleep 30

                IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$CONTAINER_ID")

                if [ "$IS_RUNNING" = "true" ]; then
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container '$CONTAINER_NAME' criado com id '$CONTAINER_ID'."
                else
                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - O container '$CONTAINER_NAME' foi criado mas parou."
                    exit 1
                fi
            fi

container_run_celery:
    stage: deploy
    extends:
        - .set_runner_tag
        - .set_none_git_strategy
    environment:
        name: $ENVIRONMENT
    script:
        - |
            set -e

            CELERY_CONTAINER_NAME="${CONTAINER_NAME}-celery"

            echo "Iniciando Celery Worker: $CELERY_CONTAINER_NAME"

            # Remove worker antigo se existir
            if docker container ls -a -f name="^${CELERY_CONTAINER_NAME}$" -q; then
                echo "Removendo container Celery antigo..."
                docker stop "$CELERY_CONTAINER_NAME" || true
                docker rm "$CELERY_CONTAINER_NAME" || true
            fi

            # Subir Celery Worker
            docker run -d \
              --name "$CELERY_CONTAINER_NAME" \
              --network "$ENVIRONMENT" \
              "$IMAGE_TAG" \
              celery -A app.report_analysis.celery_app worker \
                --loglevel=info \
                --concurrency=4 \
                --prefetch-multiplier=1

            sleep 10

            # Verificar se o worker está rodando
            if docker inspect -f "{{.State.Running}}" "$CELERY_CONTAINER_NAME" | grep true; then
                echo "Celery worker iniciado com sucesso."
            else
                echo "Falha ao iniciar o Celery worker."
                docker logs "$CELERY_CONTAINER_NAME"
                exit 1
            fi

environment_clean:
    stage: clean
    extends:
        - .set_none_git_strategy
        - .clean_job
    environment:
        name: $ENVIRONMENT
        action: stop
    rules:
        - if: "$ENVIRONMENT == 'local'"
          when: manual
    allow_failure: true
    after_script:
        - |
            CONTAINER_IDS=$(docker container ls -a -f name=^postgres_container$ -q)

            if [ -z "$CONTAINER_IDS" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' não existe."
            else
                for ID in $CONTAINER_IDS; do
                    IS_RUNNING=$(docker inspect -f "{{.State.Running}}" "$ID")

                    if [ "$IS_RUNNING" = "true" ]; then
                        docker container stop "$ID"

                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' com id '$ID' foi parado."
                    else
                        echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' com id '$ID' já está parado."
                    fi

                    docker container rm "$ID"

                    echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Container 'postgres_container' com id '$ID' foi removido."
                done
            fi
        - |
            NETWORK=$(docker network ls -f name="^${ENVIRONMENT}$" -q)

            if [ -z "$NETWORK" ]; then
                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' não existe."
            else
                docker network rm "$NETWORK"

                echo "$(date '+[%Y-%m-%d %H:%M:%S]') - Network '$ENVIRONMENT' foi removida."
            fi
