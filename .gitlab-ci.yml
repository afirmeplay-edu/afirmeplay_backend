variables:
    APP: innovplay_api
    ENVIRONMENT: prod
    RUNNER: vps
    IMAGE_TAG: "$APP:latest"
    CONTAINER_NAME: "$APP"
    NETWORK_NAME: $APP-$ENVIRONMENT
    HOST_PORT: 5000
    CONTAINER_PORT: 5000

workflow:
    rules:
        - if: "$CI_COMMIT_BRANCH == 'main'"
        - if: "$CI_COMMIT_BRANCH == 'dev'"
          variables:
              ENVIRONMENT: "dev"
              IMAGE_TAG: "$APP:dev"
              CONTAINER_NAME: "$APP-dev"
              HOST_PORT: 5001
        - if: "$CI_PIPELINE_SOURCE == 'merge_request_event'"
          variables:
              ENVIRONMENT: "local"
              RUNNER: local
              IMAGE_TAG: "$APP:local"
              CONTAINER_NAME: "$APP-local"
        - when: never

stages:
    - prebuild
    - build
    - predeploy
    - deploy
    - clean

image_clean:
    stage: prebuild
    tags:
        - $RUNNER
    variables:
        GIT_STRATEGY: none
    script:
        - RUNNING_CONTAINER_ID=$(docker container ls -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z "$RUNNING_CONTAINER_ID" ]; then
                echo "Sem container ativo."
            else
                docker container stop $RUNNING_CONTAINER_ID

                echo "Container $RUNNING_CONTAINER_ID parado."
            fi
        - CONTAINER_ID=$(docker container ls -a -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z "$CONTAINER_ID" ]; then
                echo "Container não existe."
            else
                docker container rm $CONTAINER_ID

                echo "Container $CONTAINER_ID removido."
            fi
        - IMAGE_ID=$(docker image ls -f reference=$IMAGE_TAG -q)
        - >
            if [ -z "$IMAGE_ID" ]; then
                echo "Imagem não existe."
            else
                docker image rm $IMAGE_ID

                echo "Imagem $IMAGE_ID removida."
            fi

network_create:
    stage: predeploy
    tags:
        - $RUNNER
    variables:
        GIT_STRATEGY: none
    script:
        - NETWORK=$(docker network ls -f name=$NETWORK_NAME -q)
        - >
            if [ -z "$NETWORK" ]; then
                docker network create $NETWORK_NAME

                echo "Network $NETWORK_NAME criada."
            else
                echo "Network $NETWORK_NAME já existe."
            fi

image_build:
    stage: build
    tags:
        - $RUNNER
    script:
        - docker build --no-cache -t $IMAGE_TAG .

container_run:
    stage: deploy
    tags:
        - $RUNNER
    variables:
        GIT_STRATEGY: none
    environment:
        name: $ENVIRONMENT
        on_stop: environment_clean
    script:
        - docker container run --network $NETWORK_NAME -p $HOST_PORT:$CONTAINER_PORT --name $CONTAINER_NAME -d $IMAGE_TAG

environment_clean:
    stage: clean
    variables:
        GIT_STRATEGY: none
    environment:
        name: $ENVIRONMENT
        action: stop
    rules:
        - if: "$CI_COMMIT_BRANCH == 'main' || $CI_COMMIT_BRANCH == 'dev'"
          when: never
        - when: manual
    script:
        - RUNNING_CONTAINER_ID=$(docker container ls -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z "$RUNNING_CONTAINER_ID" ]; then
                echo "Sem container ativo."
            else
                docker container stop $RUNNING_CONTAINER_ID

                echo "Container $RUNNING_CONTAINER_ID parado."
            fi
        - CONTAINER_ID=$(docker container ls -a -f ancestor=$IMAGE_TAG -q)
        - >
            if [ -z "$CONTAINER_ID" ]; then
                echo "Container não existe."
            else
                docker container rm $CONTAINER_ID

                echo "Container $CONTAINER_ID removido."
            fi
        - IMAGE_ID=$(docker image ls -f reference=$IMAGE_TAG -q)
        - >
            if [ -z "$IMAGE_ID" ]; then
                echo "Imagem não existe."
            else
                docker image rm $IMAGE_ID

                echo "Imagem $IMAGE_ID removida."
            fi
        - NETWORK_ID=$(docker network ls -f name=$NETWORK_NAME -q)
        - >
            if [ -z "$NETWORK_ID" ]; then
                echo "Network $NETWORK_NAME não existe"
            else
                docker network rm $NETWORK_ID

                echo "Network $NETWORK_NAME removida."
            fi
