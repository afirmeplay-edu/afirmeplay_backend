version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres_container
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - innovaplay_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgres_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis para Celery e cache
  redis:
    image: redis:7-alpine
    container_name: redis_container
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - innovaplay_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio-server
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:9000}
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    networks:
      - innovaplay_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Script de inicialização do MinIO (cria buckets e configura permissões)
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Aguardando MinIO ficar pronto..."
        until mc alias set myminio http://minio-server:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} 2>/dev/null; do
          echo "Aguardando MinIO..."
          sleep 2
        done
        
        echo "Criando buckets..."
        mc mb myminio/answer-sheets --ignore-existing || true
        mc mb myminio/physical-tests --ignore-existing || true
        mc mb myminio/municipality-logos --ignore-existing || true
        mc mb myminio/school-logos --ignore-existing || true
        mc mb myminio/question-images --ignore-existing || true
        mc mb myminio/user-uploads --ignore-existing || true
        
        echo "Configurando permissões..."
        mc anonymous set download myminio/answer-sheets || true
        mc anonymous set download myminio/physical-tests || true
        mc anonymous set public myminio/municipality-logos || true
        mc anonymous set public myminio/school-logos || true
        
        echo "✅ MinIO inicializado com sucesso!"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - innovaplay_network
    restart: "no"

  # API Flask
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: innovplay_api
    environment:
      # Database
      DATABASE_URL: postgresql://postgres_user:postgres_password@postgres_container:5432/postgres_db
      
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      
      # SendGrid Email
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      
      # Telegram Alerts
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID:-}
      TELEGRAM_ALERT_ENABLED: ${TELEGRAM_ALERT_ENABLED:-false}
      
      # Celery & Redis
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis_container:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis_container:6379/0
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis_container:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      
      # MinIO (MINIO_SERVER_URL = URL usada nas presigned URLs, acessível pelo browser)
      MINIO_ENDPOINT: http://minio-server:9000
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin123}}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    ports:
      - "5000:5000"
    volumes:
      - ./app:/code/app
    networks:
      - innovaplay_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 run:app

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: innovplay_api-celery
    environment:
      # Database
      DATABASE_URL: postgresql://postgres_user:postgres_password@postgres_container:5432/postgres_db
      
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      
      # SendGrid Email
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      
      # Telegram Alerts
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID:-}
      TELEGRAM_ALERT_ENABLED: ${TELEGRAM_ALERT_ENABLED:-false}
      
      # Celery & Redis
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis_container:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis_container:6379/0
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis_container:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      
      # MinIO (MINIO_SERVER_URL = URL usada nas presigned URLs)
      MINIO_ENDPOINT: http://minio-server:9000
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin123}}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    volumes:
      - ./app:/code/app
    networks:
      - innovaplay_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped
    command: celery -A app.report_analysis.celery_app worker --loglevel=info --concurrency=4 --prefetch-multiplier=1

networks:
  innovaplay_network:
    name: local
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
