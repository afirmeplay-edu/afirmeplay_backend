schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        registration:
          type: string
          nullable: true
        role:
          type: string
          enum: [aluno, professor, coordenador, diretor, admin]
        city_id:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - email
        - role

    UserWithStudentDetails: # Schema for user endpoint returning student details
      allOf:
        - $ref: '#/schemas/User'
        - type: object
          properties:
            student:
              $ref: '#/schemas/StudentDetails'
              nullable: true

    Student:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        registration:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        class_id:
          type: string
          nullable: true
        grade_id:
          type: string
          nullable: true
        school_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name

    StudentDetails: # Schema for student endpoints returning full details
      allOf:
        - $ref: '#/schemas/Student'
        - type: object
          properties:
            user:
              $ref: '#/schemas/User'
              nullable: true
            school:
              $ref: '#/schemas/SchoolDetails'
              nullable: true
            class:
              $ref: '#/schemas/Class'
              nullable: true
            grade:
              $ref: '#/schemas/Grade'
              nullable: true

    School:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        address:
          type: string
        city_id:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - city_id

    SchoolDetails: # Simplified schema for nested school details
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    City:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        state:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - state

    CityDetails: # Simplified schema for nested city details
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        state:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - state

    Class:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        school_id:
          type: string
        grade_id:
          type: string
          nullable: true
      required:
        - id
        - name
        - school_id

    ClassDetails: # Schema for class endpoints returning full details
      allOf:
        - $ref: '#/schemas/Class'
        - type: object
          properties:
            school:
              $ref: '#/schemas/SchoolDetails'
              nullable: true
            grade:
              $ref: '#/schemas/Grade'
              nullable: true

    Grade:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        education_stage_id:
          type: string
          format: uuid
          nullable: true
      required:
        - id
        - name

    GradeDetails: # Schema for grade endpoints returning full details
      allOf:
        - $ref: '#/schemas/Grade'
        - type: object
          properties:
            education_stage:
              $ref: '#/schemas/EducationStage'
              nullable: true

    EducationStage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    Subject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    Skill:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        description:
          type: string
        subject_id:
          type: string
        grade_id:
          type: string
      required:
        - id
        - code
        - description

    Question:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
        text:
          type: string
        formatted_text:
          type: string
        secondstatement:
          type: string
        images:
          type: array
          items:
            type: object
        subject_id:
          type: string
        title:
          type: string
        description:
          type: string
        command:
          type: string
        subtitle:
          type: string
        alternatives:
          type: array
          items:
            type: object
        skill:
          type: array
        grade_level:
          type: string
        difficulty_level:
          type: string
        correct_answer:
          type: string
        formatted_solution:
          type: string
        test_id:
          type: string
        question_type:
          type: string
        value:
          type: number
        topics:
          type: array
        version:
          type: integer
        created_by:
          type: string
        last_modified_by:
          type: string
        education_stage_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - text
        - question_type

    Test:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
        subject:
          type: string
        grade_id:
          type: string
        intructions:
          type: string
        max_score:
          type: number
        time_limit:
          type: string
          format: date-time
        created_by:
          type: string
        municipalities:
          type: array
        schools:
          type: array
        course:
          type: string
        model:
          type: string
        subjects_info:
          type: array
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - course
        - model
        - created_by

    TestWithQuestions:
      allOf:
        - $ref: '#/schemas/Test'
        - type: object
          properties:
            questions:
              type: array
              items:
                $ref: '#/schemas/Question'

    UserQuickLinks:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        quickLinks:
          type: array
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - quickLinks

    Teacher:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        registration:
          type: string
        birth_date:
          type: string
          format: date
        tenant_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - registration

responses:
    UnauthorizedError:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    ForbiddenError:
      description: User does not have the necessary permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    BadRequestError:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: object # Can be a string or a more detailed object
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: string
