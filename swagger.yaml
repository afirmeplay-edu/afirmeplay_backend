        '500':
          $ref: '#/responses/InternalServerError'

  /test-session/{session_id}/correct:
    post:
      summary: Correct test session
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                corrections:
                  type: array
                  items:
                    type: object
                    properties:
                      question_id:
                        type: string
