        filters_available:
          $ref: '#/schemas/DashboardFilters'
        meta:
          $ref: '#/schemas/DashboardMeta'
        error_recovery:
          $ref: '#/schemas/DashboardErrorRecovery'

tags:
  - name: Dashboard
    description: Endpoints relacionados ao dashboard e estatísticas
  - name: Scheduler
    description: Endpoints para gerenciamento e monitoramento do scheduler de tarefas agendadas

responses:
    UnauthorizedError:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Mensagem explicando o motivo da falha de autenticação.
                example: Token inválido ou expirado.
    ForbiddenError:
      description: User does not have the necessary permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Mensagem indicando que o usuário não tem permissão.
                example: Acesso negado para o recurso solicitado.
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Mensagem sobre o recurso não encontrado.
                example: Recurso solicitado não foi encontrado.
    BadRequestError:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Mensagem descrevendo o erro de validação.
                example: Dados inválidos enviados na requisição.
              details:
                type: object # Can be a string or a more detailed object
                description: Detalhes adicionais sobre o erro.
                example:
                  campo: email
                  problema: Formato inválido.
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Mensagem genérica de erro.
                example: Ocorreu um erro inesperado.
              details:
                type: string
                description: Descrição detalhada do erro para depuração.
                example: Consulte os logs do servidor para mais informações.
