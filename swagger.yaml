  /evaluation-results/evolucao/avaliacoes:
    get:
      summary: Lista avaliações disponíveis para a tela de Evolução (filtros aplicados)
      description: |
        Retorna a lista de avaliações já filtrada para a tela de Evolução.
        Use apenas este endpoint no front de Evolução para obter "Avaliações Disponíveis"
        com todos os filtros (estado, município, escola, série, turma, data início/fim, nome).
        Quando série é informada, retorna somente avaliações aplicadas em turmas dessa série.
      parameters:
        - name: estado
          in: query
          required: true
          schema:
            type: string
          description: Nome do estado (ex ALAGOAS)
        - name: municipio
          in: query
          required: true
          schema:
            type: string
          description: ID do município
        - name: escola
          in: query
          schema:
            type: string
          description: ID da escola ou 'all' para todas
        - name: serie
          in: query
          schema:
            type: string
          description: ID da série ou 'all' para todas
        - name: turma
          in: query
          schema:
            type: string
          description: ID da turma ou 'all'/'Todas' para todas
        - name: data_inicio
          in: query
          schema:
            type: string
          description: Data início (dd/mm/aaaa ou ISO)
        - name: data_fim
          in: query
          schema:
            type: string
          description: Data fim (dd/mm/aaaa ou ISO)
        - name: nome
          in: query
          schema:
            type: string
          description: Trecho do nome da avaliação (busca)
      responses:
        '200':
          description: Lista de avaliações e total
          content:
            application/json:
              schema:
                type: object
                properties:
                  avaliacoes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        titulo:
                          type: string
                        data:
                          type: string
                          nullable: true
                          description: Data de aplicação (dd/mm/aaaa) ou null
                  total:
                    type: integer
        '400':
          description: estado e/ou municipio ausentes ou município não pertence ao estado
        '401':
          $ref: '#/responses/UnauthorizedError'
        '403':
          $ref: '#/responses/ForbiddenError'
        '404':
          description: Município não encontrado
        '500':
          $ref: '#/responses/InternalServerError'

