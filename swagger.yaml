        - $ref: '#/schemas/Grade'
        - type: object
          properties:
            education_stage:
              $ref: '#/schemas/EducationStage'
              nullable: true

    EducationStage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    Subject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    Skill:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        description:
          type: string
        subject_id:
          type: string
        grade_id:
          type: string
      required:
        - id
        - code
        - description

    Question:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
        text:
          type: string
        formatted_text:
          type: string
        secondstatement:
          type: string
        images:
          type: array
          items:
            type: object
        subject_id:
          type: string
        title:
          type: string
        description:
          type: string
        command:
          type: string
        subtitle:
          type: string
        alternatives:
          type: array
