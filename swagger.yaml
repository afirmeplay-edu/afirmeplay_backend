        difficulty_level:
          type: string
        correct_answer:
          type: string
        formatted_solution:
          type: string
        test_id:
          type: string
        question_type:
          type: string
        value:
          type: number
        topics:
          type: array
        version:
          type: integer
        created_by:
          type: string
        last_modified_by:
          type: string
        education_stage_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - text
        - question_type

    Test:
      type: object
