schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        registration:
          type: string
          nullable: true
        role:
          type: string
          enum: [aluno, professor, coordenador, diretor, admin]
        city_id:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - email
        - role

    UserWithStudentDetails: # Schema for user endpoint returning student details
      allOf:
        - $ref: '#/schemas/User'
        - type: object
          properties:
            student:
              $ref: '#/schemas/StudentDetails'
              nullable: true

    Student:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        registration:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        class_id:
          type: string
          nullable: true
        grade_id:
          type: string
          nullable: true
        school_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name

    StudentDetails: # Schema for student endpoints returning full details
      allOf:
        - $ref: '#/schemas/Student'
        - type: object
          properties:
            user:
              $ref: '#/schemas/User'
              nullable: true
            school:
              $ref: '#/schemas/SchoolDetails'
              nullable: true
            class:
              $ref: '#/schemas/Class'
              nullable: true
            grade:
              $ref: '#/schemas/Grade'
              nullable: true

    School:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        address:
          type: string
        city_id:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - city_id

    SchoolDetails: # Simplified schema for nested school details
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    City:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        state:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - state

    CityDetails: # Simplified schema for nested city details
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        state:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - state

    Class:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        school_id:
          type: string
        grade_id:
          type: string
          nullable: true
      required:
        - id
        - name
        - school_id

    ClassDetails: # Schema for class endpoints returning full details
      allOf:
        - $ref: '#/schemas/Class'
        - type: object
          properties:
            school:
              $ref: '#/schemas/SchoolDetails'
              nullable: true
            grade:
              $ref: '#/schemas/Grade'
              nullable: true

    Grade:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        education_stage_id:
          type: string
          format: uuid
          nullable: true
      required:
        - id
        - name

    GradeDetails: # Schema for grade endpoints returning full details
