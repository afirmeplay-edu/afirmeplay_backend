              items:
                $ref: '#/schemas/DashboardRecentStudent'
            inactive_students:
              type: array
              items:
                type: object
                properties:
                  student_id:
                    type: string
                  name:
                    type: string
                  last_login:
                    type: string
                    format: date-time
                    nullable: true
        notifications:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              title:
                type: string
              message:
                type: string
              created_at:
                type: string
                format: date-time
              priority:
                type: string
              is_read:
                type: boolean
                nullable: true
        filters_available:
          $ref: '#/schemas/DashboardFilters'
        meta:
          $ref: '#/schemas/DashboardMeta'
        error_recovery:
          $ref: '#/schemas/DashboardErrorRecovery'

    DashboardProfessorClass:
      type: object
      properties:
        class_id:
          type: string
        class_name:
          type: string
        students:
          type: integer
        active_students:
          type: integer
        average_score:
          type: number
        pending_evaluations:
          type: integer

    DashboardProfessorEvaluation:
      type: object
      properties:
        evaluation_id:
          type: string
        title:
          type: string
        class_name:
          type: string
          nullable: true
        status:
          type: string
        total_questions:
          type: integer
        total_students:
          type: integer
        completed_students:
          type: integer
        created_at:
          type: string
          format: date-time
          nullable: true
        due_date:
          type: string
          format: date-time
