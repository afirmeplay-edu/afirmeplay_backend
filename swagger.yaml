            type: string
          description: ID da escola (para retornar series)
        - name: serie
          in: query
          schema:
            type: string
          description: ID da série (para retornar turmas)
      responses:
        '200':
          description: Opções hierárquicas (estados, municipios, escolas, series, turmas conforme parâmetros)
          content:
            application/json:
              schema:
                type: object
                properties:
                  estados:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        nome:
                          type: string
                  municipios:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
