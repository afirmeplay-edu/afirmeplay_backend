        - session_id
        - correct_answers
        - total_questions
        - score_percentage
        - grade
        - proficiency
        - classification

    DashboardSummary:
      type: object
      properties:
        students:
          type: integer
        schools:
          type: integer
        evaluations:
          type: integer
        games:
          type: integer
        users:
          type: integer
        questions:
          type: integer
        classes:
          type: integer
        teachers:
          type: integer
        active_students:
          type: integer
          nullable: true
        last_sync:
          type: string
          format: date-time

    DashboardTrend:
      type: object
      properties:
        current:
          type: number
        previous:
          type: number

    DashboardKpi:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: number
        trend:
          $ref: '#/schemas/DashboardTrend'
        active_this_week:
          type: integer
        created_this_month:
          type: integer
        pending_corrections:
          type: integer
        trend_percentage:
          type: number
      required:
        - id
        - label
        - value

    DashboardSecondaryCard:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: number
          nullable: true
        status:
          type: string
          nullable: true
      required:
        - id
        - label

    DashboardSchoolRankingEntry:
      type: object
      properties:
        position:
          type: integer
        school_id:
          type: string
        school_name:
          type: string
        municipality:
          type: string
          nullable: true
        average_score:
          type: number
        completion_rate:
          type: number
        total_students:
          type: integer
        total_evaluations:
          type: integer

    DashboardClassRankingEntry:
      type: object
      description: Entrada do ranking de turmas (turma, série, média, acerto, conclusão, alunos, avaliações)
      properties:
        position:
          type: integer
        class_id:
          type: string
        turma:
          type: string
        serie:
          type: string
        media:
          type: number
        acerto:
          type: integer
        acerto_percent:
          type: number
        conclusao:
          type: number
        alunos:
          type: integer
        avaliacoes:
          type: integer

    DashboardStudentRankingEntry:
      type: object
      properties:
        position:
          type: integer
        student_id:
          type: string
        name:
          type: string
        school_name:
          type: string
          nullable: true
        class_name:
          type: string
          nullable: true
        serie:
          type: string
          description: Série/ano do aluno (grade)
          nullable: true
        media:
          type: number
          description: Média das notas (0-10), 2 decimais
        completed_evaluations:
          type: integer

    DashboardRankings:
      type: object
      properties:
        classes:
          type: array
          description: Ranking de turmas (turma, série, média, acerto, conclusão, alunos, avaliações)
          items:
            $ref: '#/schemas/DashboardClassRankingEntry'
        students:
          type: array
          items:
            $ref: '#/schemas/DashboardStudentRankingEntry'
        teacher_rankings:
          type: array
          items:
            type: object
            properties:
              position:
                type: integer
              teacher_id:
                type: string
              teacher_name:
                type: string
              average_score:
                type: number
              total_evaluations:
                type: integer
              classes_count:
                type: integer
      required:
        - classes
        - students
        - teacher_rankings

    DashboardRecentEvaluation:
      type: object
      properties:
        evaluation_id:
          type: string
        title:
          type: string
        subject:
          type: string
          nullable: true
        school:
          type: string
          nullable: true
        class_name:
          type: string
          nullable: true
        status:
          type: string
        progress_percentage:
          type: number
        total_students:
          type: integer
        completed_students:
          type: integer
        average_score:
          type: number
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true

    DashboardRecentStudent:
      type: object
      properties:
        student_id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        registration:
          type: string
          nullable: true
        school:
          type: string
          nullable: true
        class:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    DashboardEngagementActiveUsers:
      type: object
      properties:
        today:
          type: integer
        this_week:
          type: integer
        this_month:
          type: integer
        growth_percentage:
          type: number

    DashboardEngagementSessionTime:
      type: object
      properties:
        average_minutes:
          type: number
        total_minutes:
          type: integer
        growth_percentage:
          type: number

    DashboardEngagementPopularEvaluation:
      type: object
      properties:
        evaluation_id:
          type: string
        title:
          type: string
        views:
          type: integer
        completions:
          type: integer

    DashboardEngagementReturnRate:
      type: object
      properties:
        percentage:
          type: number
        total_users:
          type: integer
        returning_users:
          type: integer
        growth_percentage:
          type: number

    DashboardEngagement:
      type: object
      properties:
        active_users:
          $ref: '#/schemas/DashboardEngagementActiveUsers'
        session_time:
          $ref: '#/schemas/DashboardEngagementSessionTime'
        popular_evaluations:
          type: array
          items:
            $ref: '#/schemas/DashboardEngagementPopularEvaluation'
        return_rate:
          $ref: '#/schemas/DashboardEngagementReturnRate'

    DashboardMetaSection:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    DashboardMeta:
      type: object
      properties:
        recent_evaluations:
          $ref: '#/schemas/DashboardMetaSection'
        recent_students:
          $ref: '#/schemas/DashboardMetaSection'

    DashboardErrorRecovery:
      type: object
      additionalProperties:
        type: string

    DashboardFilters:
      type: object
      properties:
        municipalities:
          type: array
          items:
            $ref: '#/schemas/CityDetails'
        schools:
          type: array
          items:
            $ref: '#/schemas/SchoolDetails'
        classes:
          type: array
          items:
            $ref: '#/schemas/ClassDetails'
        subjects:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string

    DashboardAdminResponse:
      type: object
      properties:
        summary:
          $ref: '#/schemas/DashboardSummary'
        kpis:
          type: array
          items:
            $ref: '#/schemas/DashboardKpi'
        secondary_cards:
          type: array
          items:
            $ref: '#/schemas/DashboardSecondaryCard'
        rankings:
          $ref: '#/schemas/DashboardRankings'
        recent_evaluations:
          type: array
          items:
            $ref: '#/schemas/DashboardRecentEvaluation'
        recent_students:
          type: array
          items:
            $ref: '#/schemas/DashboardRecentStudent'
        engagement:
